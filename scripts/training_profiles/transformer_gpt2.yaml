# GPT-2 Transformer Training Profile
# Fine-tune GPT-2 model on custom data sources
description: "Fine-tune GPT-2 transformer model on custom data sources"
model_type: transformer
source: gutenberg
transformer_config:
  model_name: gpt2
  tokenizer_name: null
  max_length: 1024
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 5e-5
  warmup_steps: 100
  save_steps: 500
  eval_steps: 500
  logging_steps: 100
  fp16: false
  use_cache: true
epochs: 3
max_books: 3
max_text_size: 500000
data_percentage: 1.0

