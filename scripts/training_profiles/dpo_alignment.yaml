# Profile for Direct Preference Optimization (DPO) to cure chattiness
name: dpo_alignment
description: "DPO tuning on Intel/orca_dpo_pairs to suppress conversational filler."

model_type: transformer
transformer_config:
  model_name: "Qwen/Qwen2-1.5B"
  # Force LoRA for DPO so we don't blow up the VRAM completely
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_dpo: true
  dpo_beta: 0.1
  dpo_max_prompt_length: 512
  max_length: 2048
  batch_size: 2
  learning_rate: 1.0e-5

sources:
  - type: huggingface
    datasets:
      - name: "Intel/orca_dpo_pairs"
        split: "train[:5000]"  # Use a subset for fast alignment

training:
  epochs: 1
  time_limit_minutes: 120
