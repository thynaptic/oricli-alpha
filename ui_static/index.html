          '--color-sc-surface':    '#0E0810',
          '--color-sc-surface2':   '#150A14',
          '--color-sc-border':     '#1E0A18',

          '--color-sc-success':    '#06D6A0',
          '--color-sc-danger':     '#FF4D6D',
          '--color-sc-blue':       '#4D9EFF',
        };
        var LIGHT = {
          '--color-sc-bg':         '#F5F0EC',
          '--color-sc-surface':    '#EDE8E3',
          '--color-sc-surface2':   '#E5DFD9',

          '--color-sc-text-muted': '#6B5F68',
          '--color-sc-text-dim':   '#9E9099',
          '--color-sc-success':    '#059669',
          '--color-sc-danger':     '#DC2626',
          '--color-sc-blue':       '#1D4ED8',
        };
        try {
          var theme = 'dark';
          var stored = localStorage.getItem('sc-store-v1');
          if (stored) {
            var t = JSON.parse(stored).state?.theme;
            if (t === 'light' || t === 'dark') theme = t;
          }
          var vars = theme === 'light' ? LIGHT : DARK;
          var r = document.documentElement.style;
          for (var k in vars) r.setProperty(k, vars[k]);
          document.documentElement.setAttribute('data-theme', theme);
          // Kill all transitions until React has rendered once
          document.documentElement.classList.add('sc-no-transition');
        } catch (e) {}
      })();
    </script>
