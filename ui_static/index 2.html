<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oricli-Alpha</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <aside class="sidebar" id="sidebar" aria-label="Navigation and settings">
        <div class="sidebar-header">
          <h1 class="logo">Oricli-Alpha</h1>
          <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
            <span id="theme-icon">🌙</span>
          </button>
        </div>
        
        <nav class="tabs" role="tablist" aria-label="Main navigation">
          <button class="tab active" data-tab="chat" role="tab" aria-selected="true" aria-controls="chat-panel">
            Chat
          </button>
          <button class="tab" data-tab="modules" role="tab" aria-selected="false" aria-controls="modules-panel">
            Modules
          </button>
          <button class="tab" data-tab="embeddings" role="tab" aria-selected="false" aria-controls="embeddings-panel">
            Embeddings
          </button>
        </nav>

        <div class="sidebar-section" id="threads-section">
          <div class="section-header">
            <span>Conversations</span>
            <button id="new-thread" class="icon-btn" aria-label="New conversation">+</button>
          </div>
          <div id="thread-list" class="thread-list"></div>
        </div>

        <div class="sidebar-section collapsible" id="settings-section">
          <div class="section-header" id="settings-toggle">
            <span>Settings</span>
            <span class="collapse-icon">▼</span>
          </div>
          <div class="section-content" id="settings-content">
            <label>
              Model
              <select id="model"></select>
            </label>
            <label>
              Temperature
              <div class="slider-container">
                <input id="temperature" type="range" min="0" max="2" step="0.1" />
                <span id="temp-value">0.7</span>
              </div>
            </label>
            <label>
              System Prompt
              <textarea id="system-prompt" rows="3" placeholder="Enter system prompt..."></textarea>
            </label>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <!-- Chat Panel -->
        <section id="chat-panel" class="panel active" role="tabpanel" aria-labelledby="chat-tab">
          <header class="panel-header">
            <div class="header-info">
              <h2>Chat</h2>
              <div class="status-indicator">
                <span id="status-text" class="status-text">Ready</span>
                <span id="connection-status" class="connection-dot"></span>
              </div>
            </div>
            <div class="header-actions">
              <button id="stop-btn" class="ghost hidden">Stop</button>
              <button id="retry-btn" class="ghost">Retry</button>
            </div>
          </header>

          <div id="error-box" class="error-box hidden" role="alert">
            <span id="error-text"></span>
            <button id="error-dismiss" class="icon-btn" aria-label="Dismiss error">×</button>
          </div>

          <div id="messages" class="messages" role="log" aria-live="polite"></div>

          <div class="composer">
            <div class="attachments" id="attachments-container">
              <input id="file-input" type="file" multiple accept="image/*,text/*,.pdf,.doc,.docx" aria-label="Attach files" />
              <button id="attach-btn" class="icon-btn" aria-label="Attach files">📎</button>
              <div id="attachment-previews" class="attachment-previews"></div>
            </div>
            <div class="composer-input-wrapper">
              <textarea 
                id="user-input" 
                rows="1" 
                placeholder="Message Oricli-Alpha..." 
                aria-label="Message input"
              ></textarea>
              <button id="send-btn" class="send-btn" aria-label="Send message">
                <span>Send</span>
              </button>
            </div>
          </div>
        </section>

        <!-- Modules Panel -->
        <section id="modules-panel" class="panel" role="tabpanel" aria-labelledby="modules-tab">
          <header class="panel-header">
            <h2>Module Testing</h2>
          </header>
          <div class="panel-content">
            <div class="module-selector">
              <label>
                Module
                <select id="module-select"></select>
              </label>
              <label>
                Operation
                <select id="operation-select" disabled>
                  <option value="">Select a module first</option>
                </select>
              </label>
            </div>
            <div class="module-params" id="module-params">
              <p class="empty-state">Select a module and operation to test</p>
            </div>
            <div class="module-actions">
              <button id="module-execute" class="primary" disabled>Execute</button>
              <button id="module-clear" class="ghost">Clear</button>
            </div>
            <div class="module-results" id="module-results"></div>
          </div>
        </section>

        <!-- Embeddings Panel -->
        <section id="embeddings-panel" class="panel" role="tabpanel" aria-labelledby="embeddings-tab">
          <header class="panel-header">
            <h2>Embeddings</h2>
          </header>
          <div class="panel-content">
            <div class="embeddings-input">
              <label>
                Input Text
                <textarea id="embeddings-input" rows="6" placeholder="Enter text to generate embeddings..."></textarea>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="embeddings-batch" />
                <span>Batch mode (one text per line)</span>
              </label>
            </div>
            <div class="embeddings-actions">
              <button id="embeddings-execute" class="primary">Generate Embeddings</button>
              <button id="embeddings-clear" class="ghost">Clear</button>
            </div>
            <div class="embeddings-results" id="embeddings-results"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="/static/utils.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/modules.js"></script>
    <script src="/static/embeddings.js"></script>
  </body>
</html>
