base_model: Qwen/Qwen2.5-1.5B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

datasets:
  - path: /workspace/sot_train.jsonl
    type: alpaca

dataset_prepared_path: /workspace/fine-tuning/.cache/sot_prepared
val_set_size: 0.05
output_dir: /workspace/fine-tuning/outputs/sot-lora

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

load_in_4bit: true
bf16: auto
fp16: false

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

num_epochs: 3
micro_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 0.0002
lr_scheduler: cosine
warmup_steps: 20

optimizer: adamw_bnb_8bit
weight_decay: 0.01
max_grad_norm: 1.0

logging_steps: 10
save_steps: 100
eval_steps: 50
save_total_limit: 3
