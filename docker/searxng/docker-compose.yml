services:
  searxng:
    image: searxng/searxng:latest
    container_name: oricli-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8080/
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  searxng_data:
